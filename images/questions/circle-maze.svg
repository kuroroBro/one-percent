<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="title desc">
  <title id="title">A carved circular maze with four labeled entry tunnels</title>
  <desc id="desc">A solid dark circular maze block with light winding tunnels carved through it. The tunnels for A, C, and D each wind inward and open directly into the centre goal chamber. The tunnel for B winds inward but ends in a rounded dead stop, never reaching the goal chamber.</desc>
  <rect width="700" height="460" rx="28" fill="#fffaf0"/>
  <text x="350" y="26" font-family="system-ui, sans-serif" text-anchor="middle" font-size="19" font-weight="700" fill="#241d42">Four people are heading for the centre. Who is going the wrong way?</text>

  <g transform="translate(0,30)">
    <!-- solid maze block -->
    <circle cx="350" cy="210" r="200" fill="#241d42"/>

    <!-- carved tunnels: thick, solid, cream -->
    <g fill="none" stroke="#fffaf0" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
      <!-- A: enters upper-right, winds down-left, then curls into the goal -->
      <path d="M 495 75 Q 440 120 445 165 Q 448 205 400 220 Q 365 231 350 210"/>
      <!-- C: enters west side (already partway in), winds up then down into the goal -->
      <path d="M 175 210 Q 220 210 232 172 Q 242 138 282 132 Q 318 127 350 210"/>
      <!-- D: enters lower-right (already close in), short winding hop into the goal -->
      <path d="M 420 300 Q 392 282 378 260 Q 366 240 350 210"/>
      <!-- B: enters upper-left, winds down, then STOPS short (dead end, rounded cap) -->
      <path d="M 205 75 Q 255 105 262 148 Q 266 174 240 186"/>
    </g>

    <!-- goal chamber -->
    <circle cx="350" cy="210" r="27" fill="#8fd6c9" stroke="#fffaf0" stroke-width="3"/>
    <text x="350" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1d3c3a">GOAL</text>

    <!-- dead-end cap marker for B, so the stop reads clearly as a wall, not a cut-off render -->
    <circle cx="240" cy="186" r="15" fill="#241d42" stroke="#e0505f" stroke-width="3"/>
  </g>

  <!-- Entry badges + arrows, drawn last so they sit on top -->
  <g transform="translate(0,30)" font-family="system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(495,75)">
      <path d="M -9 -34 L 9 -34 L 0 -14 Z" fill="#2f6fb0" transform="rotate(35)"/>
      <circle r="17" fill="#2f6fb0" stroke="#fffaf0" stroke-width="2"/>
      <text y="5" font-size="15" font-weight="800" fill="#fff">A</text>
    </g>
    <g transform="translate(205,75)">
      <path d="M -9 -34 L 9 -34 L 0 -14 Z" fill="#e0505f" transform="rotate(-35)"/>
      <circle r="17" fill="#e0505f" stroke="#fffaf0" stroke-width="2"/>
      <text y="5" font-size="15" font-weight="800" fill="#fff">B</text>
    </g>
    <g transform="translate(175,210)">
      <path d="M -9 -34 L 9 -34 L 0 -14 Z" fill="#3c9a5f" transform="rotate(90)"/>
      <circle r="17" fill="#3c9a5f" stroke="#fffaf0" stroke-width="2"/>
      <text y="5" font-size="15" font-weight="800" fill="#fff">C</text>
    </g>
    <g transform="translate(420,300)">
      <path d="M -9 -34 L 9 -34 L 0 -14 Z" fill="#c9508f" transform="rotate(-125)"/>
      <circle r="17" fill="#c9508f" stroke="#fffaf0" stroke-width="2"/>
      <text y="5" font-size="15" font-weight="800" fill="#fff">D</text>
    </g>
  </g>
</svg>
