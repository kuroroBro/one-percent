<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Two digits made of matchsticks reading 24</title>
  <desc id="desc">A digit 2 made of five matchsticks on the left and an open-style digit 4 made of three matchsticks on the right, together reading 24. One matchstick must move to a new position to make a different 3-digit number.</desc>
  <rect width="640" height="420" rx="28" fill="#fffaf0"/>
  <text x="320" y="42" font-family="system-ui, sans-serif" text-anchor="middle" font-size="19" font-weight="700" fill="#241d42">Move exactly ONE matchstick to make a new 3-digit number</text>
  <rect x="60" y="70" width="520" height="310" rx="16" fill="#2a2440"/>

  <defs>
    <g id="stick">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#d9b382" stroke-width="16" stroke-linecap="round"/>
      <ellipse cx="4" cy="0" rx="9" ry="8" fill="#9c2f2f"/>
    </g>
  </defs>

  <!-- Digit '2': box roughly x=140-260, y=110-330 -->
  <g>
    <use href="#stick" transform="translate(140,110)"/>            <!-- top: (140,110)-(240,110) -->
    <use href="#stick" transform="translate(240,110) rotate(90)"/>  <!-- right-upper vertical down to (240,210) -->
    <use href="#stick" transform="translate(240,210) rotate(180)"/> <!-- middle: (240,210)-(140,210) -->
    <use href="#stick" transform="translate(140,210) rotate(90)"/>  <!-- left-lower vertical down to (140,310) -->
    <use href="#stick" transform="translate(140,310)"/>             <!-- bottom: (140,310)-(240,310) -->
  </g>

  <!-- Digit '4' open style: box roughly x=340-460, y=110-330 -->
  <g>
    <use href="#stick" transform="translate(340,110) rotate(90)"/>  <!-- upper-left vertical, short, down to (340,210) -->
    <use href="#stick" transform="translate(340,210)"/>             <!-- middle: (340,210)-(440,210) -->
    <use href="#stick" transform="translate(440,110) rotate(90)"/>  <!-- full right vertical, (440,110)-(440,210), extend below -->
    <use href="#stick" transform="translate(440,210) rotate(90)"/>  <!-- continue right vertical down to (440,310) -->
  </g>

  <text x="320" y="395" font-family="system-ui, sans-serif" text-anchor="middle" font-size="16" fill="#9a92b8">reads 24</text>
</svg>
